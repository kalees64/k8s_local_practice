# ─────────────────────────────────────────────────────────────
# React Deployment
# ─────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: react-app
spec:
  replicas: 1

  selector:
    matchLabels:
      app: react-app

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  template:
    metadata:
      labels:
        app: react-app

    spec:
      containers:
        - name: react-app

          image: kalees64/simple-react-app:1.0
          imagePullPolicy: Always

          ports:
            - containerPort: 80

---
# ─────────────────────────────────────────────────────────────
# React Service
# ─────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: react-app-service

spec:
  selector:
    app: react-app

  ports:
    - port: 80
      targetPort: 80
      protocol: TCP

  type: ClusterIP

---
# ─────────────────────────────────────────────────────────────
# GatewayClass --> Do not include it inside deployment yaml file because Gateway class is a cluster level entity
# ─────────────────────────────────────────────────────────────
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: nginx

spec:
  controllerName: gateway.nginx.org/nginx-gateway-controller

---
# ─────────────────────────────────────────────────────────────
# Gateway
# ─────────────────────────────────────────────────────────────
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: app-gateway

spec:
  gatewayClassName: nginx

  listeners:
    - name: http
      protocol: HTTP
      port: 80
      hostname: myapp.local

---
# ─────────────────────────────────────────────────────────────
# HTTPRoute
# ─────────────────────────────────────────────────────────────
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: app-route

spec:
  parentRefs:
    - name: app-gateway

  hostnames:
    - myapp.local

  rules:
    # Frontend Route
    - matches:
        - path:
            type: PathPrefix
            value: /

      backendRefs:
        - name: react-app-service
          port: 80

    # Backend API Route
    - matches:
        - path:
            type: PathPrefix
            value: /api

      backendRefs:
        - name: simple-api-svc
          port: 80
